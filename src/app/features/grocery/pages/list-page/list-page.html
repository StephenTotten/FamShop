<header class="header">
  <div class="container">
    <div class="header-content">
      <h1 class="logo">🛒 FamShop</h1>
      <p class="tagline">Totten Family Shopping List</p>
    </div>
  </div>
</header>

<main class="main">
  <div class="container">
    <div class="add-item-section">
      <input
        [(ngModel)]="newItem"
        placeholder="Add item..."
        class="item-input"
        (keyup.enter)="addItem()"
      />
      <select
        [(ngModel)]="selectedStore"
        class="store-select"
      >
        <option [value]="anyStoreLabel">{{ anyStoreLabel }}</option>
        <option *ngFor="let store of stores" [value]="store">
          {{ store }}
        </option>
      </select>
      <button (click)="addItem()" class="btn btn-primary">
        Add Item
      </button>
    </div>

    <div class="items-section">
      <ul class="items-list">
        <li *ngFor="let item of items" class="item" [class.in-cart]="item.inCart">
          <label class="item-label">
            <input
              type="checkbox"
              [checked]="item.inCart"
              (change)="toggleItem(item.id)"
              class="item-checkbox"
            />
            <div class="item-content">
              <span class="item-name">
                {{ item.name }}
              </span>
              <div class="item-store-controls" (click)="$event.stopPropagation()">
                <button
                  type="button"
                  class="item-store item-store-trigger"
                  (click)="toggleStorePicker(item.id, $event)">
                  {{ item.store }}
                </button>

                <select
                  *ngIf="isStorePickerOpen(item.id)"
                  class="item-store-picker"
                  [ngModel]="item.store"
                  (ngModelChange)="setItemStore(item.id, $event)">
                  <option [value]="anyStoreLabel">{{ anyStoreLabel }}</option>
                  <option *ngFor="let store of stores" [value]="store">
                    {{ store }}
                  </option>
                </select>
              </div>
            </div>
          </label>
        </li>
      </ul>

      <div *ngIf="items.length === 0" class="empty-state">
        <p>No items yet. Add your first grocery item above!</p>
      </div>

      <button 
        *ngIf="items.some(i => i.inCart)" 
        (click)="deletePurchased()" 
        class="btn btn-secondary">
        Remove Purchased Items
      </button>
    </div>
  </div>
</main>
