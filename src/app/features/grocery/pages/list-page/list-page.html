<header class="header">
  <div class="container">
    <div class="header-content">
      <h1 class="logo">🛒 FamShop</h1>
      <p class="tagline">Totten Family Grocery List</p>
    </div>
  </div>
</header>

<main class="main">
  <div class="container">
    <div class="add-item-section">
      <input
        [(ngModel)]="newItem"
        placeholder="Add grocery item..."
        class="item-input"
        (keyup.enter)="addItem()"
      />
      <button (click)="addItem()" class="btn btn-primary">
        Add Item
      </button>
    </div>

    <div class="items-section">
      <ul class="items-list">
        <li *ngFor="let item of items" class="item" [class.in-cart]="item.inCart">
          <label class="item-label">
            <input
              type="checkbox"
              [checked]="item.inCart"
              (change)="toggleItem(item.id)"
              class="item-checkbox"
            />
            <span class="item-name">
              {{ item.name }}
            </span>
          </label>
        </li>
      </ul>

      <div *ngIf="items.length === 0" class="empty-state">
        <p>No items yet. Add your first grocery item above!</p>
      </div>

      <button 
        *ngIf="items.some(i => i.inCart)" 
        (click)="deletePurchased()" 
        class="btn btn-secondary">
        Clear Purchased Items
      </button>
    </div>
  </div>
</main>
