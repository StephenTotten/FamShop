<header class="header">
  <div class="container">
    <div class="header-content">
      <h1 class="logo">🛒 FamShop</h1>
      <p class="tagline">Totten Family</p>
    </div>
  </div>
</header>

<main class="main">
  <div class="container">
    <div class="add-item-section">
      <input
        [(ngModel)]="newItem"
        placeholder="Add item..."
        class="item-input"
        (keyup.enter)="addItem()"
      />
      <select
        [(ngModel)]="selectedStore"
        class="store-select"
      >
        <option [value]="ANY_STORE">Any store</option>
        <option *ngFor="let store of stores" [value]="store">
          {{ store }}
        </option>
      </select>
      <button (click)="addItem()" class="btn btn-primary">
        Add Item
      </button>
    </div>

    <div class="items-section">
      <ul class="items-list">
        <li *ngFor="let item of items" class="item" [class.in-cart]="item.inCart">
          <label class="item-label">
            <input
              type="checkbox"
              [checked]="item.inCart"
              (change)="toggleItem(item.id)"
              class="item-checkbox"
            />
              <div class="item-content">
              <span class="item-name">
                {{ item.name }}
              </span>
              <button *ngIf="item.store && item.store !== ANY_STORE" class="item-store-trigger" (click)="openStorePicker(item.id); $event.stopPropagation()">
                {{ item.store || 'Any store' }}
              </button>
              <select
                *ngIf="activeStorePickerItemId === item.id"
                class="item-store-picker"
                [value]="item.store"
                (change)="setItemStore(item.id, $any($event.target).value)"
                (click)="$event.stopPropagation()"
              >
                <option [value]="ANY_STORE">Any store</option>
                <option *ngFor="let store of stores" [value]="store">{{ store }}</option>
              </select>
            </div>
          </label>
        </li>
      </ul>

      <div *ngIf="items.length === 0" class="empty-state">
        <p>No items yet. Add your first grocery item above!</p>
      </div>

      <button 
        *ngIf="items.some(i => i.inCart)" 
        (click)="deletePurchased()" 
        class="btn btn-secondary">
        Remove Purchased Items
      </button>
    </div>
  </div>
</main>
